<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MLV Rankings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Oxanium:wght@600;700;800&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--z0:#02040f;--z1:#060b1e;--z2:#0b1230;--z3:#111c44;--z4:#1a2860;--z5:#233580;
--z6:#3a5cf0;--z7:#5b7fff;--z8:#8aaeff;--z9:#c2d8ff;--za:#e8f2ff;--zb:#ffffff;
--zc0:#080515;--zc1:#12062a;--zc2:#1e0b42;--zc3:#2d1265;--zc4:#3d1a8a;--zc5:#5a28d0;--zc6:#7b4fff;--zc7:#a57dff;--zc8:#cdb8ff;
--zg0:#ffdf40;--zg1:#ffc808;--zg2:#e6a800;
--zr0:#ff3355;--zr1:#ff6b84;
--zt0:#00e8c8;--zt1:#4dfff0;
--zm0:#ff5db4;--zm1:#ff9fd8;
--zn0:rgba(90,140,255,.06);--zn1:rgba(90,140,255,.12);--zn2:rgba(90,140,255,.22);--zn3:rgba(90,140,255,.38);
--zline:rgba(120,160,255,.14);--zline2:rgba(120,160,255,.08);
--text:#ddeeff;--muted:#7a9bd4;--muted2:#3d5990;
--ease:cubic-bezier(.22,.68,0,1.2);--easio:cubic-bezier(.4,0,.2,1);
--r1:12px;--r2:18px;--r3:26px;--r4:40px;
}
html,body{min-height:100%;font-family:'Manrope',sans-serif;color:var(--text);background:var(--z0);-webkit-font-smoothing:antialiased}
body{
  padding:20px;
  background:
    radial-gradient(ellipse 80% 60% at 10% -10%,rgba(58,92,240,.28),transparent),
    radial-gradient(ellipse 60% 50% at 95% 5%,rgba(123,79,255,.22),transparent),
    radial-gradient(ellipse 50% 70% at 60% 110%,rgba(0,232,200,.12),transparent),
    linear-gradient(160deg,#02040f 0%,#060b1e 50%,#02040f 100%);
  overflow-x:hidden;
  min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 44px,rgba(120,160,255,.028) 44px,rgba(120,160,255,.028) 45px),
    repeating-linear-gradient(90deg,transparent,transparent 44px,rgba(120,160,255,.028) 44px,rgba(120,160,255,.028) 45px);
  mask-image:radial-gradient(ellipse at 50% 30%,rgba(0,0,0,.6),transparent 72%);z-index:0;
}
body::after{
  content:"";position:fixed;inset:-25%;pointer-events:none;
  background:
    radial-gradient(circle at 20% 15%,rgba(58,92,240,.10),transparent 20%),
    radial-gradient(circle at 82% 20%,rgba(123,79,255,.08),transparent 18%),
    radial-gradient(circle at 65% 75%,rgba(0,232,200,.06),transparent 18%);
  animation:zFloat 14s ease-in-out infinite alternate;will-change:transform;z-index:0;
}
@keyframes zFloat{from{transform:translate3d(-12px,-8px,0)}to{transform:translate3d(12px,10px,0)}}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(4,8,22,.8);border-radius:99px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--z6),var(--zc5));border-radius:99px;border:2px solid rgba(4,8,22,.8)}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--z7),var(--zc6))}
::-webkit-scrollbar-corner{background:transparent}
*{scrollbar-width:thin;scrollbar-color:var(--z6) rgba(4,8,22,.8)}

button,input,select{font-family:'Manrope',sans-serif}

.zs{position:relative;z-index:1;max-width:1600px;margin:0 auto;display:grid;gap:16px}

.zh-hero{
  position:relative;overflow:hidden;
  border:1px solid var(--zn3);border-radius:var(--r3);
  background:
    radial-gradient(ellipse 70% 100% at 80% 50%,rgba(58,92,240,.18),transparent),
    radial-gradient(ellipse 40% 60% at 8% 80%,rgba(0,232,200,.10),transparent),
    linear-gradient(135deg,rgba(10,18,46,.97),rgba(5,8,22,.98));
  box-shadow:0 28px 100px rgba(0,0,0,.50),inset 0 1px 0 rgba(255,255,255,.05);
  padding:28px 32px;
  display:grid;grid-template-columns:1fr auto;gap:28px;align-items:center;
}
.zh-deco{
  position:absolute;right:-60px;top:-120px;width:420px;height:420px;border-radius:50%;
  border:1px solid rgba(90,140,255,.10);box-shadow:inset 0 0 80px rgba(90,140,255,.08);pointer-events:none;
}
.zh-deco::after{content:"";position:absolute;inset:40px;border-radius:50%;border:1px solid rgba(90,140,255,.07)}
.zh-hex{position:absolute;right:20px;top:12px;opacity:.18;pointer-events:none}
.zk{
  display:inline-flex;align-items:center;gap:8px;
  font:700 11px 'Space Mono',monospace;letter-spacing:3px;color:var(--zt0);
  text-transform:uppercase;margin-bottom:10px;text-shadow:0 0 20px rgba(0,232,200,.5);
}
.zk::before{content:"";width:28px;height:2px;background:linear-gradient(90deg,var(--zt0),transparent);border-radius:2px}
.zt{font-family:'Syne',sans-serif;font-size:80px;line-height:.88;letter-spacing:-1px;margin-bottom:14px}
.zt span{
  background:linear-gradient(110deg,#fff 0%,#c2d8ff 30%,var(--z7) 60%,var(--zc6) 85%,var(--zm0) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px rgba(90,140,255,.25));
}
.zsub{color:var(--muted);font-size:14px;line-height:1.6;font-weight:500;max-width:700px}
.zh-stats{display:flex;flex-direction:column;gap:12px;align-items:flex-end}
.zbadge{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid var(--zn2);background:linear-gradient(135deg,rgba(12,22,52,.85),rgba(6,10,24,.90));
  border-radius:var(--r2);padding:12px 18px;
  font:700 12px 'Space Mono',monospace;letter-spacing:1px;color:var(--z8);
  white-space:nowrap;min-width:160px;
  box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.04);
  transition:border-color .2s,box-shadow .2s;
}
.zbdot{width:8px;height:8px;border-radius:50%;background:var(--z7);box-shadow:0 0 12px var(--z7);flex-shrink:0}
.zbadge.zlive .zbdot{background:var(--zt0);box-shadow:0 0 12px var(--zt0);animation:zpulse 1.8s ease-in-out infinite}
.zbadge.zlive{color:var(--zt0);border-color:rgba(0,232,200,.28)}
.zbadge.zerr .zbdot{background:var(--zr0);box-shadow:0 0 8px var(--zr0)}
.zbadge.zerr{color:var(--zr0);border-color:rgba(255,51,85,.28)}
.zbval{font-size:20px;font-family:'Syne',sans-serif;color:var(--zb);line-height:1}
@keyframes zpulse{50%{transform:scale(1.5);opacity:.5}}

.znav{
  display:flex;gap:0;background:rgba(4,8,22,.6);
  border:1px solid var(--zline);border-radius:var(--r2);
  padding:6px;width:max-content;backdrop-filter:blur(10px);
}
.ztab{
  display:flex;align-items:center;gap:10px;height:50px;padding:0 24px;
  border-radius:var(--r1);border:1px solid transparent;background:transparent;
  color:var(--muted);font:700 13px 'Manrope',sans-serif;letter-spacing:.3px;
  cursor:pointer;transition:all .22s var(--easio);white-space:nowrap;
}
.ztab-ico{width:18px;height:18px;opacity:.7;transition:opacity .2s}
.ztab:hover{color:var(--text);background:rgba(90,140,255,.08)}
.ztab:hover .ztab-ico{opacity:1}
.ztab.zact{
  color:#fff;border-color:rgba(90,140,255,.5);
  background:linear-gradient(135deg,rgba(40,80,255,.9),rgba(30,55,180,.85));
  box-shadow:0 0 32px rgba(90,140,255,.28),inset 0 1px 0 rgba(255,255,255,.12);
}
.ztab.zact .ztab-ico{opacity:1}

.zctrl{
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;
  padding:16px;
  background:linear-gradient(180deg,rgba(8,14,36,.82),rgba(4,8,20,.75));
  border:1px solid var(--zline);border-radius:var(--r2);
  box-shadow:0 16px 60px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.035);
  backdrop-filter:blur(8px);
}
.zinput{
  height:50px;padding:0 18px 0 50px;
  border:1px solid var(--zline);border-radius:var(--r1);
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%235b7fff' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='7'/%3E%3Cpath d='m20 20-3.5-3.5'/%3E%3C/svg%3E") 16px center/18px 18px no-repeat,rgba(3,7,20,.75);
  color:var(--text);font-weight:700;font-size:14px;outline:none;
  transition:border-color .18s,box-shadow .18s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.zinput::placeholder{color:var(--muted2)}
.zinput:focus{border-color:rgba(90,140,255,.6);box-shadow:0 0 0 3px rgba(90,140,255,.12)}

.zfchips{display:flex;flex-wrap:wrap;gap:8px;padding:4px 2px}
.zfchip{
  display:inline-flex;align-items:center;gap:8px;
  height:42px;padding:0 16px;
  border-radius:999px;
  border:1px solid rgba(90,140,255,.22);
  background:rgba(3,7,20,.75);
  color:var(--muted);
  font:700 12px 'Space Mono',monospace;letter-spacing:.8px;text-transform:uppercase;
  cursor:pointer;transition:all .2s var(--easio);white-space:nowrap;
  position:relative;overflow:hidden;
}
.zfchip::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(90,140,255,.12),rgba(90,140,255,.04));
  opacity:0;transition:opacity .2s;
}
.zfchip:hover{color:var(--z8);border-color:rgba(90,140,255,.42)}
.zfchip:hover::before{opacity:1}
.zfchip.zfact{
  color:#fff;border-color:rgba(90,140,255,.6);
  background:linear-gradient(135deg,rgba(40,80,255,.85),rgba(30,55,180,.8));
  box-shadow:0 0 20px rgba(90,140,255,.22),inset 0 1px 0 rgba(255,255,255,.12);
}
.zfchip.zfact::before{opacity:0}
.zfchip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7;flex-shrink:0}
.zfchip.zfact .zfchip-dot{opacity:1;background:var(--zt0);box-shadow:0 0 8px var(--zt0)}

.zpod-wrap{
  display:grid;grid-template-columns:1fr 1.06fr 1fr;gap:14px;align-items:end;
}
.zpod{
  position:relative;overflow:visible;
  border:1px solid var(--zline);border-radius:var(--r3);padding:24px 20px 20px;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%,rgba(90,140,255,.16),transparent),
    linear-gradient(160deg,rgba(10,18,46,.95),rgba(4,8,20,.98));
  display:grid;grid-template-rows:auto auto 1fr auto;gap:8px;min-height:180px;
  box-shadow:0 16px 60px rgba(0,0,0,.24);
  transition:transform .28s var(--ease),box-shadow .28s var(--easio),border-color .22s;
}
.zpod::before{
  content:"";position:absolute;inset:0;border-radius:var(--r3);
  background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 60%);pointer-events:none;
}
.zpod::after{
  content:"";position:absolute;top:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(90,140,255,.4),transparent);border-radius:2px;
}
.zpod:hover{transform:translateY(-6px);box-shadow:0 0 40px rgba(90,140,255,.18),0 28px 80px rgba(0,0,0,.34);border-color:rgba(90,140,255,.32)}
.zpod.zp1{
  border-color:rgba(255,213,56,.55);
  background:
    radial-gradient(ellipse 90% 50% at 50% -10%,rgba(255,213,56,.22),transparent),
    radial-gradient(ellipse 60% 70% at 8% 8%,rgba(255,180,0,.14),transparent),
    linear-gradient(160deg,rgba(26,20,8,.96),rgba(4,8,20,.98));
  box-shadow:0 0 50px rgba(255,213,56,.14),0 24px 80px rgba(0,0,0,.30);
  min-height:210px;z-index:2;
}
.zpod.zp1::after{background:linear-gradient(90deg,transparent,rgba(255,213,56,.85),transparent)}
.zpod.zp1:hover{box-shadow:0 0 60px rgba(255,213,56,.22),0 30px 90px rgba(0,0,0,.36);border-color:rgba(255,213,56,.8)}
.zpod.zp3{
  border-color:rgba(123,79,255,.45);
  background:
    radial-gradient(ellipse 70% 60% at 8% 0%,rgba(123,79,255,.18),transparent),
    linear-gradient(160deg,rgba(16,10,36,.96),rgba(4,8,20,.98));
  box-shadow:0 0 38px rgba(123,79,255,.12),0 18px 60px rgba(0,0,0,.26);
}
.zpod.zp3::after{background:linear-gradient(90deg,transparent,rgba(123,79,255,.7),transparent)}
.zpod.zp3:hover{border-color:rgba(123,79,255,.7);box-shadow:0 0 50px rgba(123,79,255,.20),0 28px 80px rgba(0,0,0,.34)}
.zcrown-wrap{position:absolute;top:-22px;left:50%;transform:translateX(-50%);z-index:9}
.zcrown-svg{width:52px;height:auto;filter:drop-shadow(0 0 16px rgba(255,213,56,.9));animation:zcrownbob 3s ease-in-out infinite}
@keyframes zcrownbob{50%{transform:translateY(-4px) scale(1.05)}}
.zpod-rank{justify-self:start}
.zrhex{display:inline-block;width:68px;height:68px;flex-shrink:0}
.zrhex svg{width:100%;height:100%}

.zpod-score{justify-self:end;text-align:right;margin-top:-4px}
.zpnum{font-family:'Syne',sans-serif;font-size:52px;line-height:.88;color:var(--z7);text-shadow:0 0 24px rgba(90,140,255,.3)}
.zpod.zp1 .zpnum{color:var(--zg0);text-shadow:0 0 28px rgba(255,213,56,.35)}
.zpod.zp3 .zpnum{color:var(--zc7)}
.zplbl{font:700 10px 'Space Mono',monospace;letter-spacing:1.5px;color:var(--muted);margin-top:3px}
.zpod.zp1 .zplbl{color:rgba(255,213,56,.7)}
.zpod.zp3 .zplbl{color:rgba(165,125,255,.7)}
.zpname{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zppills{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;align-self:end}

.ztable-wrap{
  border:1px solid var(--zline);border-radius:var(--r3);
  background:linear-gradient(180deg,rgba(9,16,40,.95),rgba(4,8,20,.98));
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.30),inset 0 1px 0 rgba(255,255,255,.04);
  margin-top:14px;
}
.ztable{display:grid}
.zrow{
  display:grid;
  grid-template-columns:92px minmax(260px,3fr) minmax(150px,1fr) minmax(165px,1.05fr) minmax(158px,1fr) minmax(165px,1.05fr) 108px;
  gap:0;align-items:stretch;min-height:88px;padding:0 20px;
  border-bottom:1px solid var(--zline2);
  transition:background .16s var(--easio);contain:layout style;
}
.zrow.zrs{
  grid-template-columns:92px minmax(280px,3fr) minmax(185px,1.1fr) minmax(200px,1.15fr) 108px;
  align-items:stretch;contain:layout style;
}
.zrow:not(.zrh):hover{background:linear-gradient(90deg,rgba(90,140,255,.08),rgba(90,140,255,.02))}
.zrow.zrh{
  min-height:52px;
  background:linear-gradient(180deg,rgba(10,20,50,.97),rgba(7,13,32,.97));
  font:700 11px 'Space Mono',monospace;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--z7);position:sticky;top:0;z-index:3;
}
.zrow>span{
  height:auto;min-height:100%;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:10px 16px;
}
.zrow>span:not(:last-child){border-right:1px solid rgba(120,160,255,.10)}
.zrow.zrh>span:not(:last-child){border-right:1px solid rgba(120,160,255,.07)}
.zrrank{display:flex;align-items:center;justify-content:center}
.zrrank svg{width:58px;height:58px;flex-shrink:0}
.zrplayer{display:grid;gap:3px;justify-items:center;text-align:center;padding:12px 18px!important}
.zrplayer b{font-size:19px;font-weight:800;line-height:1.15;color:#eef6ff;word-break:break-word;white-space:normal}
.zrcell{
  display:flex!important;flex-wrap:wrap!important;gap:6px!important;
  justify-content:center!important;align-items:center!important;align-content:center!important;
  text-align:center!important;overflow:visible!important;padding:10px 12px!important;
  white-space:normal!important;height:auto!important;min-height:52px!important;
}
.zrtotal{font-family:'Syne',sans-serif;font-size:34px;font-weight:700;color:var(--z8)}
.zrow:nth-child(2) .zrtotal{color:var(--zg0)}
.zrow:nth-child(3) .zrtotal{color:var(--z7)}
.zrow:nth-child(4) .zrtotal{color:var(--zc7)}
.zempty,.zloading{padding:44px;text-align:center;color:var(--muted);font:700 13px 'Space Mono',monospace;letter-spacing:.5px}

.zpill{
  --pc1:var(--z7);--pc2:var(--z6);--pfg:var(--za);--prim:rgba(90,140,255,.28);
  display:inline-flex;flex-direction:row;align-items:center;justify-content:center;gap:4px;
  min-height:28px;padding:6px 12px;border-radius:999px;
  border:1px solid var(--prim);
  background:linear-gradient(135deg,color-mix(in srgb,var(--pc1) 20%,transparent),color-mix(in srgb,var(--pc2) 15%,transparent)),rgba(0,0,0,.12);
  color:var(--pfg);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 0 14px color-mix(in srgb,var(--pc2) 22%,transparent);
  font:800 11.5px 'Space Mono',monospace;letter-spacing:.2px;line-height:1;white-space:nowrap;vertical-align:middle;
}
.zpill small{display:inline-block;font:700 9px 'Space Mono',monospace;opacity:.72;letter-spacing:.8px;line-height:1}
.zpill.znil{opacity:.32;background:transparent;border-color:rgba(120,160,255,.10);box-shadow:none;color:var(--muted2)}
.zpill.zplibero{--pc1:#ff8adf;--pc2:#ff3fbf;--pfg:#ffd8f4;--prim:rgba(255,63,191,.28)}
.zpill.zpspiker{--pc1:#ff7777;--pc2:#ff263d;--pfg:#ffe0e0;--prim:rgba(255,38,61,.28)}
.zpill.zpds{--pc1:#79c5ff;--pc2:#327cff;--pfg:#e1f1ff;--prim:rgba(50,124,255,.28)}
.zpill.zpsetter{--pc1:#65ffb0;--pc2:#10b86a;--pfg:#ddffef;--prim:rgba(16,184,106,.28)}
.zpill.zpchamp{--pc1:#a5d9ff;--pc2:#4f8cff;--pfg:#eaf7ff;--prim:rgba(79,140,255,.28)}
.zpill.zps1{--pc1:#9be7ff;--pc2:#38bdf8;--pfg:#e7fbff;--prim:rgba(56,189,248,.28)}
.zpill.zps2{--pc1:#73ffb5;--pc2:#21c46c;--pfg:#eafff4;--prim:rgba(33,196,108,.28)}
.zpill.zps3{--pc1:#c084fc;--pc2:#7c3aed;--pfg:#f0e5ff;--prim:rgba(124,58,237,.28)}
.zpill.zps4{--pc1:#ff78c8;--pc2:#ff315a;--pfg:#ffe3f1;--prim:rgba(255,49,90,.28)}
.zpill.zps5{--pc1:#e5b8ff;--pc2:#a855f7;--pfg:#f6e8ff;--prim:rgba(168,85,247,.28)}
.zpill.zps6{--pc1:#79fff2;--pc2:#08c6d6;--pfg:#e6fffd;--prim:rgba(8,198,214,.28)}
.zpill.zpleaguemvp{--pc1:#fff29a;--pc2:#ffb800;--pfg:#fff7c7;--prim:rgba(255,184,0,.35)}
.zpill.zpallstar{--pc1:#c58a5a;--pc2:#7a431f;--pfg:#ffe8d0;--prim:rgba(122,67,31,.32)}
.zpill.zpfinalmvp{--pc1:#ffffff;--pc2:#b7c7e8;--pfg:#ffffff;--prim:rgba(200,220,255,.35)}
.zpill.zpsemifinalmvp{--pc1:#d6c4ff;--pc2:#8b5cf6;--pfg:#f0eaff;--prim:rgba(139,92,246,.30)}
.zqty{display:inline;font:800 11.5px 'Space Mono',monospace;letter-spacing:.2px;line-height:1;vertical-align:middle}
.zqty.zq1{background:linear-gradient(180deg,#fff,#cbd7e8 55%,#8898ad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 6px rgba(200,215,235,.5))}
.zqty.zq2{background:linear-gradient(180deg,#fff8ad,#ffe13b 55%,#c89600);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 8px rgba(255,225,59,.4))}
.zqty.zq3{background:linear-gradient(180deg,#ffd6a1,#ff8a24 55%,#bb4500);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 10px rgba(255,138,36,.45))}

<script>
const ZAPI="https://script.google.com/macros/s/AKfycbz_IrXjXg_yRuDmIDQCsGSvnq3I827Cx4d-PtL-uZ0D0dx--KYtKCpkeoy0BHrNYpto/exec";
const ZAPI_SEASON8="https://script.google.com/macros/s/AKfycbyrm_tBt2G3bUAxHRgXfQebLxI86uFGixV5SOl7vxHqg3STrLUir10d9yLURlMGwE5Dwg/exec";
let ZHALL=[],ZSEAS=[],ZMVPS8=[],ZLSIG="",ZTAB="hall",ZFILT="all";
const Z$=id=>document.getElementById(id);
const Zcl=v=>String(v??"").trim();
const Zkey=(r,a)=>{for(const n of a)if(r[n]!=null&&Zcl(r[n]))return r[n];return""};
const Zhas=(p,k)=>Zcl(p[k]).length>0;
const Zsrch=p=>Object.values(p).join(" ").toLowerCase();

function Zstatus(txt,type){
  const el=Z$("zsync");
  el.innerHTML="";
  const dot=document.createElement("div");dot.className="zbdot";
  const sp=document.createElement("span");sp.textContent=txt;
  el.appendChild(dot);el.appendChild(sp);
  el.className="zbadge"+(type?" z"+type:"");
}

function ZnormHall(r){
  return{
    name:Zcl(Zkey(r,["name","player","players","Player","Players","PLAYER","PLAYERS","Jogador","JOGADOR"])),
    handle:Zcl(Zkey(r,["handle","user","discord","Handle","@","Discord","User"])),
    top1:Zcl(Zkey(r,["top1","TOP1","TOP 1","Top 1","top 1"])),
    top5:Zcl(Zkey(r,["top5","TOP5","TOP 5+","Top 5+","top 5+","TOP 5"])),
    potw:Zcl(Zkey(r,["potw","POTW","Player of the Week","PLAYER OF THE WEEK"])),
    series:Zcl(Zkey(r,["series","Series","Player of the Series","PLAYER OF THE SERIES"])),
    mvps:Zcl(Zkey(r,["mvps","MVPs","MVPS","MVP"])),
    champions:Zcl(Zkey(r,["champions","Champions","CHAMPIONS","Champion"])),
    points:Number(Zkey(r,["points","Points","POINTS","Total","TOTAL"])||0)||0
  };
}
function ZnormSeas(r){
  return{
    name:Zcl(Zkey(r,["name","player","players","Player","Players","PLAYER","PLAYERS","Jogador","JOGADOR"])),
    handle:Zcl(Zkey(r,["handle","user","discord","Handle","@","Discord","User"])),
    top1:Zcl(Zkey(r,["top1","TOP1","TOP 1","Top 1","top 1"])),
    top5:Zcl(Zkey(r,["top5","TOP5","TOP 5+","Top 5+","top 5+","TOP 5","Top 5"])),
    points:Number(Zkey(r,["points","Points","POINTS","Total","TOTAL","Pts","PTS"])||0)||0
  };
}
function ZnormMvpS8(r){
  return{
    name:Zcl(Zkey(r,["name","player","players","Player","Players","PLAYER","PLAYERS","Jogador","JOGADOR"])),
    handle:Zcl(Zkey(r,["handle","user","discord","Handle","@","Discord","User"])),
    mvps:Zcl(Zkey(r,["mvps","MVPs","MVPS","mvp","MVP","awards","Awards","award","Award"])),
    role:Zcl(Zkey(r,["role","Role","position","Position","cargo","Cargo"])),
    team:Zcl(Zkey(r,["team","Team","time","Time"])),
    points:Number(Zkey(r,["points","Points","POINTS","Total","TOTAL","Pts","PTS"])||0)||0
  };
}
function ZreadPayload(raw){
  if(Array.isArray(raw))return{hall:raw,seasonal:[]};
  return{
    hall:raw.rankings||raw.hall||raw.hof||raw.players||raw.rows||raw.data||[],
    seasonal:raw.seasonalRankings||raw.seasonal||[],
    mvps8:raw.mvpsS8||raw.mvpS8||raw.mvps8||raw.mvp8||raw["Season 8"]||raw["Season 8"]||raw.s8Mvps||raw.s8MVPs||[]
  };
}

async function Zsync(){
  try{
    if(!ZAPI||ZAPI.includes("SEU_LINK")){Zstatus("ADD SHEET LINK","err");return}
    Zstatus("SYNCING");

    const mainRes=await fetch(ZAPI,{method:"GET",cache:"no-store"});
    if(!mainRes.ok)throw new Error("MAIN HTTP "+mainRes.status);
    const mainText=await mainRes.text();

    let mainRaw;
    try{mainRaw=JSON.parse(mainText)}catch{throw new Error("MAIN NOT JSON")}

    const pl=ZreadPayload(mainRaw);
    const hall=(pl.hall||[]).map(ZnormHall).filter(p=>p.name);
    const seas=(pl.seasonal||[]).map(ZnormSeas).filter(p=>p.name);

    let mvps8=[];
    if(ZAPI_SEASON8&&!ZAPI_SEASON8.includes("SEU_LINK")){
      try{
        const s8Res=await fetch(ZAPI_SEASON8,{method:"GET",cache:"no-store"});
        if(!s8Res.ok)throw new Error("SEASON 8 HTTP "+s8Res.status);
        const s8Text=await s8Res.text();

        let s8Raw;
        try{s8Raw=JSON.parse(s8Text)}catch{throw new Error("SEASON 8 NOT JSON")}

        const s8Payload=ZreadPayload(s8Raw);
        mvps8=(s8Payload.mvps8||[]).map(ZnormMvpS8).filter(p=>p.name);
      }catch(s8Err){
        console.error("Season 8 sheet error:",s8Err);
        mvps8=[];
      }
    }

    const sig=JSON.stringify({hall,seas,mvps8});
    if(sig!==ZLSIG){ZHALL=hall;ZSEAS=seas;ZMVPS8=mvps8;ZLSIG=sig;ZrenderAll()}
    Zstatus("LIVE DATA","live");
  }catch(err){
    console.error(err);Zstatus("SHEET ERROR","err");
    if(!ZHALL.length&&!ZSEAS.length){
      Z$("zpodium").innerHTML="";
      Z$("zhallTable").innerHTML='<div class="zempty">Could not load Google Sheet. Check Apps Script permissions.</div>';
      Z$("zseasTable").innerHTML='<div class="zempty">Could not load seasonal data.</div>';
      Z$("zmvps8Table").innerHTML='<div class="zempty">Could not load Season 8 data.</div>';
    }
  }
}

function Zesc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function ZqtyClass(txt){
  const m=Zcl(txt).match(/(\d+)/);if(!m)return"";
  const n=+m[1];if(n>=10)return"zq4";if(n>=5)return"zq3";if(n>=3)return"zq2";if(n>=1)return"zq1";return"";
}
function ZachClass(txt){
  const t=Zcl(txt).toLowerCase();const c=[];
  if(/\bs1\b/i.test(txt))c.push("zps1");
  else if(/\bs2\b/i.test(txt))c.push("zps2");
  else if(/\bs3\b/i.test(txt))c.push("zps3");
  else if(/\bs4\b/i.test(txt))c.push("zps4");
  else if(/\bs5\b/i.test(txt))c.push("zps5");
  else if(/\bs6\b/i.test(txt))c.push("zps6");
  if(t.includes("league mvp"))c.push("zpleaguemvp");
  else if(t.includes("final mvp"))c.push("zpfinalmvp");
  else if(t.includes("semifinal mvp"))c.push("zpsemifinalmvp");
  else if(t.includes("all star"))c.push("zpallstar");
  else if(t.includes("champion")||/\bs[1-6]\b/i.test(txt))c.push("zpchamp");
  else if(t.includes("libero"))c.push("zplibero");
  else if(t.includes("spiker"))c.push("zpspiker");
  else if(/\bds\b/i.test(txt))c.push("zpds");
  else if(t.includes("setter"))c.push("zpsetter");
  return c.join(" ");
}
function ZfmtAch(item){
  const s=Zesc(item);const m=Zcl(item).match(/^(\d+)\s*[xX]\s*(.+)$/);
  if(!m)return`<span class="zach">${s}</span>`;
  const qty=m[1]+"x";const label=m[2].trim();const qc=ZqtyClass(qty);
  return`<span class="zqty ${qc}">${Zesc(qty)}</span><span class="zach">${Zesc(label)}</span>`;
}
function ZpillsHTML(txt){
  const items=Zcl(txt).split(",").map(x=>x.trim()).filter(Boolean);
  if(!items.length)return'<span class="zpill znil">—</span>';
  return items.map(item=>`<span class="zpill ${ZachClass(item)}">${ZfmtAch(item)}</span>`).join("");
}
function ZchipHTML(txt,lbl){
  const items=Zcl(txt).split(",").map(x=>x.trim()).filter(Boolean);
  if(!items.length)return"";
  return items.map((item,i)=>`<span class="zpill ${ZachClass(item)}">${i===0&&lbl?`<small>${Zesc(lbl)}</small>`:""}${ZfmtAch(item)}</span>`).join("");
}

function ZsortHall(){return[...ZHALL].sort((a,b)=>b.points-a.points||a.name.localeCompare(b.name))}
function ZsortSeas(){return[...ZSEAS].sort((a,b)=>b.points-a.points||a.name.localeCompare(b.name))}
function ZfiltHall(){
  const q=Z$("zsearch").value.toLowerCase().trim();
  let rows=ZHALL.filter(p=>!q||Zsrch(p).includes(q));
  if(ZFILT==="champion")rows=rows.filter(p=>Zhas(p,"champions"));
  if(ZFILT==="mvp")rows=rows.filter(p=>Zhas(p,"mvps"));
  if(ZFILT==="potw")rows=rows.filter(p=>Zhas(p,"potw"));
  if(ZFILT==="series")rows=rows.filter(p=>Zhas(p,"series"));
  return rows.sort((a,b)=>b.points-a.points||a.name.localeCompare(b.name));
}
function ZfiltSeas(){
  const q=Z$("zsearch").value.toLowerCase().trim();
  return ZsortSeas().filter(p=>!q||Zsrch(p).includes(q));
}
function ZsortMvps8(){return[...ZMVPS8].sort((a,b)=>b.points-a.points||a.name.localeCompare(b.name))}
function ZfiltMvps8(){
  const q=Z$("zsearch").value.toLowerCase().trim();
  return ZsortMvps8().filter(p=>!q||Zsrch(p).includes(q));
}

function ZcrownSVG(){
  return`<div class="zcrown-wrap"><svg class="zcrown-svg" viewBox="0 0 96 72" aria-hidden="true">
    <defs><linearGradient id="zcg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff6b0"/><stop offset=".4" stop-color="#ffd338"/><stop offset="1" stop-color="#ff9800"/>
    </linearGradient></defs>
    <path d="M12 58h72l5-39-24 17L48 8 31 36 7 19l5 39Z" fill="url(#zcg)"/>
    <path d="M20 64h56" stroke="#ffe480" stroke-width="7" stroke-linecap="round"/>
    <circle cx="48" cy="12" r="5" fill="#fff9c4"/>
    <circle cx="8" cy="19" r="5" fill="#fff9c4"/>
    <circle cx="88" cy="19" r="5" fill="#fff9c4"/>
  </svg></div>`;
}
function ZhexSVG(label,fill,stroke,textFill,glow){
  const txt=String(label);const fs=txt.length<=2?20:txt.length<=3?15:11;
  return`<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 10px ${glow})">
    <polygon points="30,3.5 56.5,17.75 56.5,42.25 30,56.5 3.5,42.25 3.5,17.75" fill="${fill}" stroke="${stroke}" stroke-width="2.2"/>
    <text x="30" y="30" text-anchor="middle" dy=".36em" font-family="Space Mono,monospace" font-size="${fs}" font-weight="800" fill="${textFill}">${txt}</text>
  </svg>`;
}
function ZhexBlue(r){return`<div class="zrhex">${ZhexSVG("#"+r,"rgba(90,140,255,.12)","rgba(90,140,255,.5)","#8aaeff","rgba(90,140,255,.4)")}</div>`}
function ZhexGold(r){return`<div class="zrhex">${ZhexSVG("#"+r,"rgba(255,213,56,.12)","rgba(255,213,56,.7)","#ffdf40","rgba(255,213,56,.6)")}</div>`}
function ZhexPurp(r){return`<div class="zrhex">${ZhexSVG("#"+r,"rgba(123,79,255,.12)","rgba(123,79,255,.6)","#a57dff","rgba(123,79,255,.45)")}</div>`}
function ZrowHex(n){
  const txt=String(n);const fs=txt.length<=2?20:txt.length<=3?15:11;
  let fill,stroke,textFill,glow;
  if(n===1){fill="rgba(255,213,56,.12)";stroke="rgba(255,213,56,.65)";textFill="#ffdf40";glow="rgba(255,213,56,.4)"}
  else if(n===2){fill="rgba(90,140,255,.12)";stroke="rgba(90,140,255,.55)";textFill="#8aaeff";glow="rgba(90,140,255,.35)"}
  else if(n===3){fill="rgba(123,79,255,.12)";stroke="rgba(123,79,255,.6)";textFill="#a57dff";glow="rgba(123,79,255,.38)"}
  else{fill="rgba(60,90,160,.08)";stroke="rgba(60,90,160,.28)";textFill="#4a6bb5";glow="transparent"}
  return`<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 8px ${glow})">
    <polygon points="30,3.5 56.5,17.75 56.5,42.25 30,56.5 3.5,42.25 3.5,17.75" fill="${fill}" stroke="${stroke}" stroke-width="2.2"/>
    <text x="30" y="30" text-anchor="middle" dy=".36em" font-family="Space Mono,monospace" font-size="${fs}" font-weight="800" fill="${textFill}">#${txt}</text>
  </svg>`;
}

function ZrenderPodium(){
  const top=ZsortHall().slice(0,3);
  if(!top.length){Z$("zpodium").innerHTML="";return}
  const ord=[top[1],top[0],top[2]];
  const ranks=["2","1","3"];
  const cls=["","zp1","zp3"];
  const badgeFn=[ZhexBlue,ZhexGold,ZhexPurp];
  Z$("zpodium").innerHTML=ord.filter(Boolean).map((p,i)=>`
    <article class="zpod ${cls[i]}">
      ${i===1?ZcrownSVG():""}
      <div class="zpod-rank">${badgeFn[i](ranks[i])}</div>
      <div class="zpod-score"><div class="zpnum">${p.points}</div><div class="zplbl">POINTS</div></div>
      <div class="zpname">${Zesc(p.name)}</div>
      <div class="zppills">${ZchipHTML(p.top1,"TOP 1")}${ZchipHTML(p.champions,"")}${ZchipHTML(p.mvps,"")}</div>
    </article>`).join("");
}

function ZrenderHall(){
  const base=ZsortHall();base.forEach((p,i)=>p._rank=i+1);
  const rows=ZfiltHall();
  const head=`<div class="zrow zrh"><span>Rank</span><span>Player</span><span>TOP 1</span><span>TOP 5+</span><span>MVPs</span><span>Champions</span><span>Points</span></div>`;
  if(!ZHALL.length){Z$("zhallTable").innerHTML='<div class="zempty">No Hall of Fame data found.</div>';return}
  if(!rows.length){Z$("zhallTable").innerHTML=head+'<div class="zempty">No players match your search.</div>';return}
  Z$("zhallTable").innerHTML=head+rows.map(p=>`
    <div class="zrow">
      <span class="zrrank">${ZrowHex(p._rank)}</span>
      <span class="zrplayer"><b>${Zesc(p.name)}</b></span>
      <span class="zrcell">${ZpillsHTML(p.top1)}</span>
      <span class="zrcell">${ZpillsHTML(p.top5)}</span>
      <span class="zrcell">${ZpillsHTML(p.mvps)}</span>
      <span class="zrcell">${ZpillsHTML(p.champions)}</span>
      <span class="zrtotal">${p.points}</span>
    </div>`).join("");
}

function ZrenderSeas(){
  const rows=ZfiltSeas();
  const head=`<div class="zrow zrs zrh"><span>Rank</span><span>Player</span><span>TOP 1</span><span>TOP 5</span><span>Points</span></div>`;
  if(!ZSEAS.length){Z$("zseasTable").innerHTML='<div class="zempty">No Seasonal Rankings data found.</div>';return}
  if(!rows.length){Z$("zseasTable").innerHTML=head+'<div class="zempty">No players match your search.</div>';return}
  Z$("zseasTable").innerHTML=head+rows.map((p,i)=>`
    <div class="zrow zrs">
      <span class="zrrank">${ZrowHex(i+1)}</span>
      <span class="zrplayer"><b>${Zesc(p.name)}</b></span>
      <span class="zrcell">${ZpillsHTML(p.top1)}</span>
      <span class="zrcell">${ZpillsHTML(p.top5)}</span>
      <span class="zrtotal">${p.points}</span>
    </div>`).join("");
}

function ZrenderMvps8(){
  const rows=ZfiltMvps8();
  const head=`<div class="zrow zmvp zrh"><span>Rank</span><span>Player</span><span>Season 8</span><span>Role</span><span>Team</span><span>Points</span></div>`;
  if(!ZMVPS8.length){Z$("zmvps8Table").innerHTML='<div class="zempty">No MVP\'s S8 data found. Apps Script must return mvpsS8 separately.</div>';return}
  if(!rows.length){Z$("zmvps8Table").innerHTML=head+'<div class="zempty">No players match your search.</div>';return}
  Z$("zmvps8Table").innerHTML=head+rows.map((p,i)=>`
    <div class="zrow zmvp">
      <span class="zrrank">${ZrowHex(i+1)}</span>
      <span class="zrplayer"><b>${Zesc(p.name)}</b></span>
      <span class="zrcell">${ZpillsHTML(p.mvps)}</span>
      <span class="zrcell">${ZpillsHTML(p.role)}</span>
      <span class="zrcell">${ZpillsHTML(p.team)}</span>
      <span class="zrtotal">${p.points}</span>
    </div>`).join("");
}

function ZsetTab(tab){
  ZTAB=tab;
  document.querySelectorAll(".ztab").forEach(b=>b.classList.toggle("zact",b.dataset.tab===tab));
  const hv=Z$("zhallView"),sv=Z$("zseasView"),mv=Z$("zmvps8View");
  hv.classList.toggle("zhide",tab!=="hall");
  sv.classList.toggle("zhide",tab!=="seasonal");
  mv.classList.toggle("zhide",tab!=="mvps8");
  const active=tab==="hall"?hv:(tab==="seasonal"?sv:mv);
  active.classList.add("zview-enter");setTimeout(()=>active.classList.remove("zview-enter"),400);
  Z$("zfilters").style.display=tab==="hall"?"":"none";
}

function ZrenderAll(){
  const uniq=new Set([...ZHALL,...ZSEAS,...ZMVPS8].map(p=>p.name.toLowerCase().trim()));
  Z$("ztotal").textContent=uniq.size;
  ZrenderPodium();ZrenderHall();ZrenderSeas();ZrenderMvps8();
}

Z$("zsearch").addEventListener("input",ZrenderAll);
document.querySelectorAll(".ztab").forEach(b=>b.addEventListener("click",()=>ZsetTab(b.dataset.tab)));
document.querySelectorAll(".zfchip").forEach(b=>b.addEventListener("click",()=>{
  ZFILT=b.dataset.f;
  document.querySelectorAll(".zfchip").forEach(c=>c.classList.toggle("zfact",c===b));
  ZrenderAll();
}));

ZsetTab("hall");
Zsync();
setInterval(Zsync,60000);
</script>
</body>
</html>
